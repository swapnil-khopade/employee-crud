<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Employee List</title>
	
	    <title>Employee List</title>
	    <style>
	        body {
	            font-family: Arial, sans-serif;
	            margin: 30px;
	            background-color: #f5f5f5;
	        }
	        h2 {
	            color: #333;
				text-align: center;
				margin-bottom: 20px;
	        }
	        table {
	            width: 100%;
	            border-collapse: collapse;
	            background-color: #fff;
	        }
	        table, th, td {
	            border: 1px solid #aaa;
	        }
	        th {
	            background-color: #4CAF50;
	            color: white;
	            padding: 8px;
	        }
	        td {
	            padding: 8px;
	            text-align: center;
	        }
	        a {
	            text-decoration: none;
	            color: #2196F3;
	            margin-right: 10px;
	        }
	        a:hover {
	            text-decoration: underline;
	        }
			.button {
			    display: inline-block;
			    background-color: #4CAF50;
			    color: white;
			    padding: 8px 15px;
			    text-decoration: none;
			    border-radius: 5px;
			    font-weight: bold;
			}
			.button:hover {
			    background-color: #45a049;
			}

	    </style>
	

</head>
<body>
	<h2>Employee Management</h2>
	
	<a th:href="@{/addEmployee}" class="button">Add Employee</a><br><br>
	
	<table border="1">
		<tr>
			<th>Name</th>
			<th>Email</th>
			<th>Department</th>
			<th>Salary</th>
			<th>Action</th>
		</tr>
		
		<tr th:each="emp : ${employees}">
			<td th:text="${emp.name}"></td>
			<td th:text="${emp.email}"></td>
			<td th:text="${emp.department}"></td>
			<td th:text="${emp.salary}"></td>
			<td>
				<a th:href="@{/updateEmployee/{id}(id=${emp.id})}">Edit</a>
				<a th:href="@{/deleteEmployee/{id}(id=${emp.id})}">Delete</a>
			</td>			
		</tr>
	</table>
</body>
	
</html>
