<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
    <style>
        /* General page styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        /* Page title */
        h2 {
            text-align: center;
            color: #333;
            margin-top: 30px;
            margin-bottom: 30px;
        }

        /* Form card */
        form {
            width: 400px;
            background-color: #fff;
            margin: 0 auto; /* center horizontally */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Labels */
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        /* Input fields */
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="hidden"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* Buttons */
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h2>Add or Update Employee</h2>
    <form th:action="@{/saveEmployee}" th:object="${employee}" method="post">
        <input type="hidden" th:field="*{id}" />

        <label for="name">Name</label>
        <input type="text" th:field="*{name}" id="name" placeholder="Enter name" required />

        <label for="email">Email</label>
        <input type="text" th:field="*{email}" id="email" placeholder="Enter email" required />

        <label for="department">Department</label>
        <input type="text" th:field="*{department}" id="department" placeholder="Enter department" required />

        <label for="salary">Salary</label>
        <input type="text" th:field="*{salary}" id="salary" placeholder="Enter salary" required />

        <div style="text-align: center; margin-top: 20px;">
            <button type="submit">Save</button>
        </div>
    </form>
</body>
</html>
